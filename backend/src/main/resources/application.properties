spring.application.name=backend
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
server.port=8090
server.ssl.enabled=true
server.ssl.key-store=classpath:cloudpage-dev.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=cloudpage
# PostgreSQL DB Connection
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.datasource.url=jdbc:postgresql://localhost:5433/cloud-db
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.configUrl=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
# JWT Secret Key for signing tokens
jwt.secret=ab9bb63c49d6d8b4029a1e6e3b1947d34be053f8ce5a0ee391e46f393014694e
# Rate limiting (per-user / per-IP) for file operations.
# A non-positive capacity disables limiting for that category. The per-client tier is
# keyed by username (or client IP for unauthenticated calls); the global tier is a single
# instance-wide budget, disabled by default. Values are overridable via environment
# variables (e.g. CLOUDPAGE_RATE_LIMIT_PER_CLIENT_UPLOAD_CAPACITY).
cloudpage.rate-limit.enabled=true
cloudpage.rate-limit.per-client.upload.capacity=30
cloudpage.rate-limit.per-client.upload.refill-period=1m
cloudpage.rate-limit.per-client.download.capacity=120
cloudpage.rate-limit.per-client.download.refill-period=1m
cloudpage.rate-limit.per-client.listing.capacity=240
cloudpage.rate-limit.per-client.listing.refill-period=1m
cloudpage.rate-limit.per-client.scan.capacity=1
cloudpage.rate-limit.per-client.scan.refill-period=5m
cloudpage.rate-limit.per-client.secure-send-create.capacity=20
cloudpage.rate-limit.per-client.secure-send-create.refill-period=1h
cloudpage.rate-limit.per-client.secure-send-access.capacity=120
cloudpage.rate-limit.per-client.secure-send-access.refill-period=1m
# Secure Send external links. Links must expire within max-expiry; expired records are retained
# briefly for operational visibility before scheduled cleanup.
cloudpage.secure-send.max-expiry=30d
cloudpage.secure-send.retention=30d
cloudpage.secure-send.cleanup-cron=0 30 3 * * *
# Folder virus scanning (async, ClamAV clamd over INSTREAM). Disabled by default so a deployment
# without a clamd daemon does not attempt network connections. Enable it and point host/port at a
# reachable clamd instance to turn it on.
cloudpage.virus-scan.enabled=false
cloudpage.virus-scan.host=localhost
cloudpage.virus-scan.port=3310
cloudpage.virus-scan.timeout-ms=30000
cloudpage.virus-scan.max-concurrent-scans=2
# Finished scan jobs are kept in memory for this long, then pruned by a periodic cleanup.
cloudpage.virus-scan.retention-minutes=60
cloudpage.virus-scan.eviction-interval-ms=600000
